services:
  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - api
  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://admin:supersecret@db:5432/app
      REDIS_URL: redis://cache:6379
    depends_on:
      - db
      - cache
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: supersecret
  cache:
    image: redis:7
  worker:
    build: ./worker
    environment:
      - QUEUE_URL=amqp://guest:guestpw@broker:5672
    depends_on:
      - broker
  broker:
    image: rabbitmq:3-management
